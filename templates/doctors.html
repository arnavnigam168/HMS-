{% extends "base.html" %}

{% block content %}
<section class="card">
    <h2>Doctor Management</h2>
    <form id="doctor-form" class="form-grid">
        <input type="text" id="doctor-name" placeholder="Doctor Name" required>
        <input type="text" id="doctor-specialization" placeholder="Specialization" required>
        <input type="text" id="doctor-availability" placeholder="Availability" required>
        <button type="submit">Add Doctor</button>
    </form>
</section>

<section class="card">
    <h3>All Doctors</h3>
    <div class="table-wrap">
        <table id="doctors-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Specialization</th>
                    <th>Availability</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</section>
{% endblock %}
